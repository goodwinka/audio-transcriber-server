<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Транскрипция аудио</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1115;
            --surface: #1a1d24;
            --surface-2: #22262f;
            --border: #2e333d;
            --text: #e4e6eb;
            --text-dim: #8b8f99;
            --accent: #4a9eff;
            --accent-glow: rgba(74, 158, 255, 0.15);
            --green: #3dd68c;
            --red: #ff5c5c;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Source Sans 3', system-ui, sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header svg { flex-shrink: 0; }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        header span {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: auto;
            font-family: var(--mono);
        }

        main {
            width: 100%;
            max-width: 720px;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        /* ── Upload Zone ── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-zone svg { margin-bottom: 1rem; }

        .upload-zone p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .upload-zone .formats {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        /* ── File Info ── */
        .file-info {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-top: 1rem;
            align-items: center;
            gap: 1rem;
        }

        .file-info.visible { display: flex; }

        .file-info .name {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-info .size {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: var(--mono);
            flex-shrink: 0;
        }

        .file-info .remove {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.2rem;
            line-height: 1;
        }

        .file-info .remove:hover { color: var(--red); }

        /* ── Button ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.9rem 1.5rem;
            margin-top: 1rem;
            border: none;
            border-radius: 10px;
            font-family: var(--sans);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-download {
            background: var(--surface-2);
            color: var(--green);
            border: 1px solid var(--border);
            margin-top: 0.75rem;
        }

        .btn-download:hover { background: var(--surface); }

        /* ── Progress ── */
        .progress {
            display: none;
            margin-top: 1.5rem;
        }

        .progress.visible { display: block; }

        .progress-bar-track {
            height: 4px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0%   { width: 0%;  margin-left: 0; }
            50%  { width: 60%; margin-left: 20%; }
            100% { width: 0%;  margin-left: 100%; }
        }

        .progress-text {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
            text-align: center;
        }

        /* ── Result ── */
        .result {
            display: none;
            margin-top: 1.5rem;
        }

        .result.visible { display: block; }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .result-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 1rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .stats .speed { color: var(--green); }

        .result-text {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .result-text::-webkit-scrollbar { width: 6px; }
        .result-text::-webkit-scrollbar-track { background: transparent; }
        .result-text::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ── Error ── */
        .error {
            display: none;
            margin-top: 1rem;
            padding: 0.9rem 1.25rem;
            background: rgba(255, 92, 92, 0.1);
            border: 1px solid rgba(255, 92, 92, 0.3);
            border-radius: 10px;
            color: var(--red);
            font-size: 0.9rem;
        }

        .error.visible { display: block; }

        /* ── History ── */
        .history {
            margin-top: 2.5rem;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .history-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .history-count {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .history-empty {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-family: var(--mono);
            text-align: center;
            padding: 1.5rem;
            border: 1px dashed var(--border);
            border-radius: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            gap: 0.25rem 1rem;
            transition: border-color 0.15s;
        }

        .history-item:hover {
            border-color: var(--accent);
        }

        .history-item .h-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .h-preview {
            font-size: 0.8rem;
            color: var(--text-dim);
            grid-column: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .h-meta {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-dim);
            text-align: right;
            grid-row: 1;
            grid-column: 2;
            white-space: nowrap;
        }

        .history-item .h-download {
            grid-row: 2;
            grid-column: 2;
            text-align: right;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
        }

        .history-item .h-download:hover {
            text-decoration: underline;
        }

        /* ── Footer ── */
        footer {
            width: 100%;
            padding: 1rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        @media (max-width: 600px) {
            main { padding: 1.5rem 1rem; }
            .upload-zone { padding: 2rem 1rem; }
            .stats { gap: 0.5rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<header>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" x2="12" y1="19" y2="22"/>
    </svg>
    <h1>Транскрипция аудио</h1>
    <span>vosk</span>
</header>

<main>
    <!-- Upload -->
    <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".wav,.mp3,.ogg,.flac,.m4a,.aac,.wma,.webm">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" x2="12" y1="3" y2="15"/>
        </svg>
        <p>Перетащите аудиофайл сюда<br>или нажмите для выбора</p>
        <div class="formats">wav · mp3 · ogg · flac · m4a · aac · webm</div>
    </div>

    <!-- File Info -->
    <div class="file-info" id="fileInfo">
        <span class="name" id="fileName"></span>
        <span class="size" id="fileSize"></span>
        <button class="remove" id="removeFile" title="Удалить">×</button>
    </div>

    <!-- Transcribe Button -->
    <button class="btn btn-primary" id="transcribeBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Транскрибировать
    </button>

    <!-- Progress -->
    <div class="progress" id="progress">
        <div class="progress-bar-track">
            <div class="progress-bar-fill"></div>
        </div>
        <div class="progress-text" id="progressText">Конвертация и распознавание...</div>
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

    <!-- Result -->
    <div class="result" id="result">
        <div class="result-header">
            <h2>Результат</h2>
            <div class="stats" id="stats"></div>
        </div>
        <div class="result-text" id="resultText"></div>
        <a class="btn btn-download" id="downloadBtn" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" x2="12" y1="15" y2="3"/>
            </svg>
            Скачать .txt
        </a>
    </div>
    <!-- History -->
    <div class="history" id="historySection">
        <div class="history-header">
            <h2>История транскрипций</h2>
            <span class="history-count" id="historyCount"></span>
        </div>
        <div id="historyContent">
            <div class="history-empty">Нет транскрипций</div>
        </div>
    </div>
</main>

<footer>макс. размер файла: 500 МБ</footer>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeFile = document.getElementById('removeFile');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const errorDiv = document.getElementById('error');
    const result = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const stats = document.getElementById('stats');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' Б';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
        return (bytes / (1024 * 1024)).toFixed(1) + ' МБ';
    }

    function formatDuration(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m > 0 ? `${m}м ${s}с` : `${s}с`;
    }

    function setFile(file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        fileInfo.classList.add('visible');
        transcribeBtn.disabled = false;
        errorDiv.classList.remove('visible');
    }

    function clearFile() {
        selectedFile = null;
        fileInput.value = '';
        fileInfo.classList.remove('visible');
        transcribeBtn.disabled = true;
    }

    // Drag & drop
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    removeFile.addEventListener('click', e => {
        e.stopPropagation();
        clearFile();
    });

    // History
    async function loadHistory() {
        try {
            const resp = await fetch('/history');
            const items = await resp.json();
            renderHistory(items);
        } catch (e) {
            // ignore
        }
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function renderHistory(items) {
        const container = document.getElementById('historyContent');
        const count = document.getElementById('historyCount');

        if (!items || items.length === 0) {
            container.innerHTML = '<div class="history-empty">Нет транскрипций</div>';
            count.textContent = '';
            return;
        }

        count.textContent = `${items.length} файл${items.length === 1 ? '' : items.length < 5 ? 'а' : 'ов'}`;

        const list = document.createElement('div');
        list.className = 'history-list';

        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'history-item';
            const dur = item.stats ? `${item.stats.duration_sec}с` : '';
            el.innerHTML = `
                <span class="h-name">${item.original_name || item.id}</span>
                <span class="h-meta">${formatDate(item.created_at)}${dur ? ' · ' + dur : ''}</span>
                <span class="h-preview">${item.preview || ''}</span>
                <a class="h-download" href="${item.download}" download>скачать .txt</a>
            `;
            list.appendChild(el);
        });

        container.innerHTML = '';
        container.appendChild(list);
    }

    loadHistory();

    // Transcribe
    transcribeBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        transcribeBtn.disabled = true;
        progress.classList.add('visible');
        result.classList.remove('visible');
        errorDiv.classList.remove('visible');
        progressText.textContent = 'Загрузка и конвертация...';

        const formData = new FormData();
        formData.append('audio', selectedFile);

        try {
            const resp = await fetch('/transcribe', { method: 'POST', body: formData });
            const data = await resp.json();

            if (!resp.ok) {
                throw new Error(data.error || 'Ошибка сервера');
            }

            // Показываем результат
            resultText.textContent = data.text;
            downloadBtn.href = data.download;

            const s = data.stats;
            stats.innerHTML = `
                <span>аудио: ${formatDuration(s.duration_sec)}</span>
                <span>обработка: ${s.total_sec}с</span>
                <span class="speed">×${s.speed_x} скорость</span>
            `;

            result.classList.add('visible');
            loadHistory();

        } catch (err) {
            errorDiv.textContent = err.message;
            errorDiv.classList.add('visible');
        } finally {
            progress.classList.remove('visible');
            transcribeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
